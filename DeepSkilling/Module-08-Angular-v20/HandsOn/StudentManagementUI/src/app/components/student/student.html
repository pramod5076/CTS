<div class="container">

<h1>{{title}}</h1>

<input
type="text"
[(ngModel)]="studentName"
placeholder="Enter Student Name">

<button (click)="addStudent()">
Add Student
</button>

<br><br>

<table border="1" width="100%">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Department</th>
</tr>

<tr *ngFor="let student of students">

<td>{{student.id}}</td>
<td>{{student.name}}</td>
<td>{{student.age}}</td>
<td>{{student.department}}</td>

</tr>

</table>

</div>
