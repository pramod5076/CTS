<h2>Add Student</h2>

<form (ngSubmit)="saveStudent()">

  <table>

    <tr>
      <td>Name</td>
      <td>
        <input
          type="text"
          name="name"
          [(ngModel)]="student.name"
          required>
      </td>
    </tr>

    <tr>
      <td>Age</td>
      <td>
        <input
          type="number"
          name="age"
          [(ngModel)]="student.age"
          required>
      </td>
    </tr>

    <tr>
      <td>Department</td>
      <td>
        <input
          type="text"
          name="department"
          [(ngModel)]="student.department"
          required>
      </td>
    </tr>

    <tr>
      <td colspan="2">
        <button type="submit">
          Save Student
        </button>
      </td>
    </tr>

  </table>

</form>
