<h2>Edit Student</h2>

<form (ngSubmit)="updateStudent()">

<table>

<tr>
<td>Name</td>
<td>
<input
type="text"
name="name"
[(ngModel)]="student.name">
</td>
</tr>

<tr>
<td>Age</td>
<td>
<input
type="number"
name="age"
[(ngModel)]="student.age">
</td>
</tr>

<tr>
<td>Department</td>
<td>
<input
type="text"
name="department"
[(ngModel)]="student.department">
</td>
</tr>

<tr>
<td colspan="2">

<button type="submit">
Update Student
</button>

</td>
</tr>

</table>

</form>
