<h2>Students</h2>

<table border="1" width="100%">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Department</th>
<th>Actions</th>

</tr>

@for(student of students; track student.id){

<tr>

<td>{{student.id}}</td>
<td>{{student.name}}</td>
<td>{{student.age}}</td>
<td>{{student.department}}</td>

<td>

<a [routerLink]="['/edit-student', student.id]">

Edit

</a>

&nbsp;|&nbsp;

<button (click)="deleteStudent(student.id)">

Delete

</button>

</td>

</tr>

}

</table>
